<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — Poltek GT CTF Lab</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <div class="admin-sidebar">
      <div class="sidebar-logo">🛡️ CTF Admin</div>
      <button class="sidebar-link active" id="nav-students" onclick="showSection('students')">👥 Data Mahasiswa</button>
      <button class="sidebar-link" id="nav-scoreboard" onclick="showSection('scoreboard')">🏆 Scoreboard</button>
      <button class="sidebar-link" id="nav-overview" onclick="showSection('overview')">📊 Ringkasan</button>
      <div style="margin-top:auto;padding-top:20px;border-top:1px solid var(--border)">
        <a href="/api/admin/export" class="btn-export" style="width:100%;justify-content:center;margin-bottom:8px">⬇️ Export CSV</a>
        <button class="sidebar-link" onclick="logout()" style="color:var(--red)">🚪 Keluar</button>
      </div>
    </div>

    <!-- Main -->
    <div class="admin-main">
      <!-- Header -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px">
        <div>
          <h1 style="font-size:1.4rem;margin-bottom:4px">Panel Dosen</h1>
          <p class="text-dim" style="font-size:0.875rem">Monitoring hasil kerja mahasiswa</p>
        </div>
        <div class="user-badge">Admin: <span id="admin-name">...</span></div>
      </div>

      <!-- Overview Stats -->
      <div id="sec-overview" style="display:none">
        <h2 style="margin-bottom:16px;font-size:1.1rem">📊 Ringkasan</h2>
        <div class="stats-grid" id="overview-stats"></div>
        <div class="table-wrap" style="margin-top:20px">
          <div style="padding:14px 18px;border-bottom:1px solid var(--border);font-weight:600">Distribusi Nilai per Challenge</div>
          <div style="padding:16px 18px" id="challenge-dist"></div>
        </div>
      </div>

      <!-- Students Section -->
      <div id="sec-students">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <h2 style="font-size:1.1rem">👥 Data Mahasiswa</h2>
          <div style="display:flex;gap:8px">
            <input type="text" id="search-student" placeholder="Cari NIM / nama..." class="flag-input" style="width:200px" oninput="filterStudents()">
            <a href="/api/admin/export" class="btn-export">⬇️ Export CSV</a>
          </div>
        </div>
        <div class="table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>#</th><th>NIM</th><th>Nama</th><th>Challenge Selesai</th><th>Total Poin</th><th>Terdaftar</th><th>Aksi</th>
              </tr>
            </thead>
            <tbody id="students-body"></tbody>
          </table>
        </div>
      </div>

      <!-- Scoreboard Section -->
      <div id="sec-scoreboard" style="display:none">
        <h2 style="margin-bottom:16px;font-size:1.1rem">🏆 Scoreboard</h2>
        <div class="table-wrap">
          <table class="scoreboard-table">
            <thead><tr><th>#</th><th>NIM</th><th>Nama</th><th>Progress</th><th>Total Poin</th></tr></thead>
            <tbody id="score-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Detail -->
  <div class="modal-overlay" id="detail-modal">
    <div class="modal" style="max-width:600px;width:90%">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h3 id="modal-title">Detail Mahasiswa</h3>
        <button onclick="closeModal()" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:1.2rem">✕</button>
      </div>
      <div id="modal-content"></div>
    </div>
  </div>

  <script>
    let studentsData = [], scoreboardData = [];

    async function init() {
      const me = await fetch('/api/auth/me').then(r=>r.json()).catch(()=>null);
      if (!me || me.role !== 'admin') return location.href = '/';
      document.getElementById('admin-name').textContent = me.user.username;
      await loadAll();
    }

    async function loadAll() {
      [studentsData, scoreboardData] = await Promise.all([
        fetch('/api/admin/students').then(r=>r.json()),
        fetch('/api/scoreboard').then(r=>r.json())
      ]);
      renderStudents(studentsData);
      renderScoreboard(scoreboardData);
      renderOverview(studentsData);
    }

    function renderStudents(data) {
      document.getElementById('students-body').innerHTML = data.map((s, i) => `
        <tr>
          <td class="text-dim">${i+1}</td>
          <td><span class="nim-code">${s.nim}</span></td>
          <td style="font-weight:500">${s.name}</td>
          <td>
            <div style="display:flex;align-items:center;gap:8px">
              <div style="width:80px;background:var(--bg3);border-radius:20px;height:5px;overflow:hidden">
                <div style="width:${Math.round(s.solved_count/6*100)}%;height:100%;background:linear-gradient(90deg,var(--green),var(--cyan));border-radius:20px"></div>
              </div>
              <span class="mono" style="font-size:0.8rem;color:var(--text-dim)">${s.solved_count}/6</span>
            </div>
          </td>
          <td><strong style="color:var(--green);font-family:monospace">${s.total_points}</strong> <span class="text-dim" style="font-size:0.8rem">pts</span></td>
          <td class="text-dim" style="font-size:0.8rem">${new Date(s.created_at).toLocaleDateString('id-ID')}</td>
          <td style="display:flex;gap:6px">
            <button class="btn-sm" onclick="showDetail(${s.id},'${s.name}')">Detail</button>
            <button class="btn-danger" onclick="deleteStudent(${s.id},'${s.name}')">Hapus</button>
          </td>
        </tr>`).join('');
    }

    function filterStudents() {
      const q = document.getElementById('search-student').value.toLowerCase();
      const filtered = studentsData.filter(s => s.nim.includes(q) || s.name.toLowerCase().includes(q));
      renderStudents(filtered);
    }

    function renderScoreboard(data) {
      document.getElementById('score-body').innerHTML = data.map((s, i) => {
        const rc = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-other';
        return `<tr>
          <td><span class="rank-badge ${rc}">${i+1}</span></td>
          <td><span class="nim-code">${s.nim}</span></td>
          <td>${s.name}</td>
          <td>
            <div style="display:flex;align-items:center;gap:8px">
              <div style="flex:1;max-width:120px;background:var(--bg3);border-radius:20px;height:6px;overflow:hidden">
                <div style="width:${Math.round(parseInt(s.total_points)/1200*100)}%;height:100%;background:linear-gradient(90deg,var(--green),var(--cyan));border-radius:20px"></div>
              </div>
              <span class="text-dim mono" style="font-size:0.8rem">${s.solved_count}/6</span>
            </div>
          </td>
          <td><span class="points-big">${s.total_points}</span></td>
        </tr>`;
      }).join('');
    }

    function renderOverview(data) {
      const totalStudents = data.length;
      const avgPoints = totalStudents ? Math.round(data.reduce((s,d)=>s+parseInt(d.total_points),0)/totalStudents) : 0;
      const completed = data.filter(d=>d.solved_count===6).length;
      document.getElementById('overview-stats').innerHTML = `
        <div class="stat-card"><div class="stat-value">${totalStudents}</div><div class="stat-label">Total Mahasiswa</div></div>
        <div class="stat-card"><div class="stat-value">${avgPoints}</div><div class="stat-label">Rata-rata Poin</div></div>
        <div class="stat-card"><div class="stat-value">${completed}</div><div class="stat-label">Selesai Semua</div></div>
        <div class="stat-card"><div class="stat-value">${data.filter(d=>d.total_points>0).length}</div><div class="stat-label">Aktif Berpartisipasi</div></div>`;

      const challenges = ['xss-1','xss-2','xss-3','sqli-1','sqli-2','sqli-3'];
      const challengeNames = ['XSS #1 Reflected','XSS #2 Stored','XSS #3 Cookie','SQLi #1 Login','SQLi #2 UNION','SQLi #3 Blind'];
      const points = [100,200,300,100,200,300];
      document.getElementById('challenge-dist').innerHTML = challengeNames.map((name,i) => {
        const solved = data.filter(d=>d.solved_count > i).length; // approximation
        const pct = totalStudents ? Math.round(solved/totalStudents*100) : 0;
        return `<div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:0.875rem">${name} <span class="badge-points" style="font-size:0.75rem">⚡${points[i]}pts</span></span>
            <span class="text-dim mono" style="font-size:0.8rem">${pct}%</span>
          </div>
          <div class="progress-bar-wrap" style="height:6px"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        </div>`;
      }).join('');
    }

    async function showDetail(id, name) {
      document.getElementById('modal-title').textContent = `Detail: ${name}`;
      document.getElementById('modal-content').innerHTML = '<p class="text-dim">Memuat...</p>';
      document.getElementById('detail-modal').classList.add('open');
      const data = await fetch(`/api/admin/detail/${id}`).then(r=>r.json());
      if (!data.length) {
        document.getElementById('modal-content').innerHTML = '<p class="text-dim">Belum menyelesaikan challenge apapun.</p>';
        return;
      }
      document.getElementById('modal-content').innerHTML = `
        <table style="width:100%;border-collapse:collapse;font-size:0.875rem">
          <thead><tr style="color:var(--text-dim)"><th style="padding:8px;text-align:left">Challenge</th><th style="padding:8px;text-align:left">Kategori</th><th style="padding:8px;text-align:left">Poin</th><th style="padding:8px;text-align:left">Waktu</th></tr></thead>
          <tbody>${data.map(r=>`<tr>
            <td style="padding:8px;font-weight:500">${r.title}</td>
            <td style="padding:8px"><span class="cat-${r.category}" style="font-size:0.8rem;font-weight:600;text-transform:uppercase">${r.category}</span></td>
            <td style="padding:8px;color:var(--green);font-weight:700;font-family:monospace">+${r.points}</td>
            <td style="padding:8px;color:var(--text-dim);font-size:0.8rem">${new Date(r.submitted_at).toLocaleString('id-ID')}</td>
          </tr>`).join('')}</tbody>
        </table>
        <div style="margin-top:12px;padding:12px;background:var(--bg3);border-radius:var(--radius)">
          <strong>Total: <span style="color:var(--green)">${data.reduce((s,r)=>s+r.points,0)} poin</span> dari ${data.length} challenge</strong>
        </div>`;
    }

    function closeModal() { document.getElementById('detail-modal').classList.remove('open'); }

    async function deleteStudent(id, name) {
      if (!confirm(`Hapus data mahasiswa "${name}"? Semua submission akan dihapus juga.`)) return;
      await fetch(`/api/admin/student/${id}`, {method:'DELETE'});
      await loadAll();
    }

    function showSection(sec) {
      document.querySelectorAll('[id^="sec-"]').forEach(el=>el.style.display='none');
      document.querySelectorAll('.sidebar-link').forEach(el=>el.classList.remove('active'));
      document.getElementById('sec-'+sec).style.display='block';
      document.getElementById('nav-'+sec).classList.add('active');
    }

    async function logout() {
      await fetch('/api/auth/logout', {method:'POST'});
      location.href = '/';
    }

    init();
  </script>
</body>
</html>
